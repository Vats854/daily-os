<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2f6fed" />
    <title>Daily OS</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="icon" href="/icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="stylesheet" href="/styles.css?v=143" />
    <link rel="stylesheet" href="/task-core.css?v=143" />
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/index.global.min.js"></script>
  </head>
  <body data-auth="checking">
    <section class="auth-gate" id="authGate" aria-label="Вход в Daily OS">
      <div class="auth-card">
        <div class="auth-brand">
          <span class="brand-mark"></span>
          <div>
            <strong>Second Brain</strong>
            <span>Daily OS</span>
          </div>
        </div>
        <div class="auth-copy">
          <p class="eyebrow">Private workspace</p>
          <h1>Войди, чтобы открыть свой Daily OS</h1>
          <p>Планы, привычки, входящие и действия ассистента синхронизируются только с твоей учёткой.</p>
        </div>
        <button class="primary-button auth-gate-button" id="authGateButton" type="button">Войти через GitHub</button>
        <p class="auth-footnote" id="authGateStatus">Проверяем подключение Supabase...</p>
      </div>
    </section>

    <div class="simple-app" id="simpleApp" aria-label="Daily OS" data-foundation="task-core">
      <aside class="simple-icon-rail" aria-label="Модули">
        <button type="button" data-simple-module="capture" aria-label="Входящие" title="Входящие">
          <img src="/icons/inbox.svg" alt="" />
        </button>
        <span class="simple-module-divider" aria-hidden="true"></span>
        <button type="button" data-simple-module="tasks" aria-label="Задачи" title="Задачи">
          <img src="/icons/list-todo.svg" alt="" />
        </button>
        <button type="button" data-simple-module="calendar" aria-label="Календарь" title="Календарь">
          <img src="/icons/calendar-days.svg" alt="" />
        </button>
        <button type="button" data-simple-module="habits" aria-label="Привычки" title="Привычки">
          <img src="/icons/circle-check-big.svg" alt="" />
        </button>
        <button type="button" data-simple-module="focus" aria-label="Фокус" title="Фокус">
          <img src="/icons/timer.svg" alt="" />
        </button>
        <span class="simple-module-divider" aria-hidden="true"></span>
        <button type="button" data-simple-module="notes" aria-label="Заметки" title="Заметки">
          <img src="/icons/notebook-pen.svg" alt="" />
        </button>
        <button type="button" data-simple-module="projects" aria-label="Проекты" title="Проекты">
          <img src="/icons/diamond.svg" alt="" />
        </button>
        <button type="button" data-simple-module="log" aria-label="Журнал" title="Журнал">
          <img src="/icons/history.svg" alt="" />
        </button>
        <span class="simple-module-spacer" aria-hidden="true"></span>
        <button type="button" data-simple-module="search" aria-label="Поиск" title="Поиск">
          <img src="/icons/search.svg" alt="" />
        </button>
      </aside>

      <aside class="simple-list-rail" aria-label="Списки">
        <div class="simple-account">
          <span class="brand-mark"></span>
          <div>
            <strong>Daily OS</strong>
            <button class="simple-sync-toggle" id="simpleSyncToggle" type="button" aria-label="Проверить синхронизацию" aria-expanded="false">
              <span class="simple-sync-dot" aria-hidden="true"></span><small id="simpleSyncStatus">local</small>
            </button>
          </div>
          <button class="simple-appearance-toggle" id="simpleAppearanceToggle" type="button" aria-label="Настроить оформление" aria-expanded="false">
            <img src="/icons/ellipsis.svg" alt="" />
          </button>
          <div class="simple-appearance-menu" id="simpleAppearanceMenu" hidden>
            <span>Палитра</span>
            <div class="appearance-options">
              <button type="button" data-appearance-theme="sage"><i class="appearance-swatch sage"></i>Sage</button>
              <button type="button" data-appearance-theme="sky"><i class="appearance-swatch sky"></i>Sky</button>
              <button type="button" data-appearance-theme="clay"><i class="appearance-swatch clay"></i>Clay</button>
            </div>
            <span>Шрифт</span>
            <div class="appearance-options font-options">
              <button type="button" data-appearance-font="clean">Clean</button>
              <button type="button" data-appearance-font="soft">Soft</button>
              <button type="button" data-appearance-font="editorial">Editorial</button>
            </div>
          </div>
        </div>
        <nav class="simple-nav" id="simpleNav"></nav>
      </aside>

      <main class="simple-main" aria-label="Рабочая область">
        <header class="simple-main-head">
          <div>
            <h1 id="simpleTitle">Сегодня</h1>
            <p id="simpleSubtitle">Чистый список задач и заметок.</p>
          </div>
          <div class="simple-head-actions">
            <button class="simple-mobile-sync-toggle" id="simpleMobileSyncToggle" type="button" aria-label="Проверить синхронизацию" aria-expanded="false">
              <span class="simple-sync-dot" aria-hidden="true"></span>
            </button>
            <div class="simple-search-shell">
              <img src="/icons/search.svg" alt="" />
              <input id="simpleSearch" type="search" autocomplete="off" placeholder="Поиск" aria-label="Поиск по задачам и заметкам" />
              <div class="simple-search-results" id="simpleSearchResults" hidden></div>
            </div>
            <button class="secondary-button" id="simpleAuthButton" type="button">Войти</button>
            <button class="secondary-button" id="simpleSignOutButton" type="button">Выйти</button>
          </div>
        </header>

        <form class="simple-composer" id="simpleComposer">
          <input id="simpleComposerInput" type="text" placeholder="+ Добавить задачу или заметку" />
          <button class="primary-button" type="submit">Добавить</button>
        </form>

        <div class="simple-list" id="simpleList"></div>
      </main>

      <aside class="simple-detail" id="simpleDetail" aria-label="Параметры"></aside>
      <div class="simple-sync-panel" id="simpleSyncPanel" hidden></div>
      <input id="simpleBackupInput" type="file" accept="application/json,.json" hidden />
      <div class="simple-toast-layer" id="simpleToastLayer" aria-live="polite"></div>
    </div>

    <script src="/app.js?v=143" type="module"></script>
  </body>
</html>
