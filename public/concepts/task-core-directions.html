<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Daily OS — Task Core Directions</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #151a24;
      --muted: #6d7584;
      --line: #e5e8ed;
      --surface: #ffffff;
      --canvas: #f7f8fa;
      --blue: #3169d8;
      --blue-soft: #edf3ff;
      --green: #2e7d62;
      --amber: #b97814;
      --danger: #c84949;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--canvas); color: var(--ink); }
    button, input, textarea { font: inherit; }
    button { cursor: pointer; }
    img { display: block; width: 18px; height: 18px; }

    .lab-bar {
      position: sticky;
      top: 0;
      z-index: 50;
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto minmax(260px, 1fr);
      align-items: center;
      gap: 24px;
      min-height: 64px;
      padding: 10px 20px;
      border-bottom: 1px solid #dfe3e9;
      background: rgba(255,255,255,.97);
    }

    .lab-title strong, .lab-title span { display: block; }
    .lab-title strong { font-size: 14px; }
    .lab-title span { margin-top: 2px; color: var(--muted); font-size: 12px; }
    .direction-tabs { display: flex; gap: 4px; padding: 4px; border: 1px solid var(--line); border-radius: 8px; background: #f4f5f7; }
    .direction-tabs button { min-height: 36px; padding: 0 15px; border: 0; border-radius: 6px; background: transparent; color: #596273; font-weight: 700; }
    .direction-tabs button.active { background: #fff; color: var(--ink); box-shadow: 0 1px 4px rgba(20,25,35,.1); }
    .direction-note { grid-column: 3; grid-row: 1; justify-self: end; color: var(--muted); font-size: 12px; text-align: right; }
    .style-controls { grid-column: 3; grid-row: 1; display: none; align-items: center; justify-content: flex-end; gap: 5px; }
    .style-controls.visible { display: flex; }
    .style-controls button { min-height: 30px; padding: 0 9px; border: 1px solid var(--line); border-radius: 6px; background: #fff; color: #667080; font-size: 11px; font-weight: 700; }
    .style-controls button.active { border-color: #9db7aa; background: #edf4f0; color: #315d4d; }

    .prototype { min-height: calc(100vh - 64px); background: var(--canvas); }
    .app-grid { display: grid; min-height: calc(100vh - 64px); background: var(--surface); }

    .module-rail { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 14px 8px; border-right: 1px solid var(--line); background: #fbfcfd; }
    .module-rail button { display: grid; place-items: center; width: 38px; height: 38px; padding: 0; border: 0; border-radius: 7px; background: transparent; }
    .module-rail button.active { background: var(--blue-soft); }
    .module-rail .module-spacer { flex: 1; }
    .module-rail .module-divider { width: 24px; height: 1px; margin: 2px 0; background: var(--line); }

    .sidebar { min-width: 0; padding: 18px 14px; border-right: 1px solid var(--line); overflow: auto; }
    .brand { display: flex; align-items: center; gap: 10px; min-height: 42px; padding: 0 8px 14px; border-bottom: 1px solid var(--line); }
    .brand-mark { width: 26px; height: 26px; border-radius: 7px; background: var(--blue); }
    .brand strong, .brand small { display: block; }
    .brand small { margin-top: 1px; color: var(--muted); }
    .nav-section { margin-top: 20px; }
    .nav-label { padding: 0 9px 8px; color: #99a1af; font-size: 10px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; }
    .nav-item { display: grid; grid-template-columns: 20px minmax(0,1fr) auto; align-items: center; gap: 8px; width: 100%; min-height: 38px; padding: 0 10px; border: 0; border-radius: 7px; background: transparent; color: #4d5768; text-align: left; }
    .nav-item > img { width: 16px; height: 16px; opacity: .65; }
    .nav-item strong { min-width: 0; overflow: hidden; font-weight: 680; text-overflow: ellipsis; white-space: nowrap; }
    .nav-item > span:last-child { color: #9aa3b2; font-size: 12px; }
    .nav-item.active { background: var(--blue-soft); color: #1f55ba; }
    .nav-group { margin-top: 8px; }
    .nav-group-head { display: grid; grid-template-columns: 20px minmax(0,1fr) auto; align-items: center; gap: 8px; width: 100%; min-height: 36px; padding: 0 10px; border: 0; background: transparent; color: #485247; text-align: left; }
    .nav-group-head > img { width: 16px; height: 16px; opacity: .62; }
    .nav-group-head strong { font-size: 12px; font-weight: 760; }
    .nav-group-head span { color: #8b938c; font-size: 11px; }
    .nav-group-items { padding-left: 13px; }
    .nav-group-items.collapsed { display: none; }
    .sidebar-list-row { position: relative; display: grid; grid-template-columns: minmax(0,1fr) 26px; align-items: center; }
    .sidebar-list-row .nav-item { min-width: 0; }
    .list-edit-trigger { display: grid; place-items: center; width: 26px; height: 28px; padding: 0; border: 0; border-radius: 6px; background: transparent; opacity: 0; }
    .sidebar-list-row:hover .list-edit-trigger, .list-edit-trigger[aria-expanded="true"] { opacity: .65; }
    .list-edit-trigger:hover { background: #deddd7; opacity: 1; }
    .list-edit-trigger img { width: 15px; height: 15px; }
    .list-editor { position: absolute; top: 32px; left: 4px; z-index: 20; width: 214px; padding: 12px; border: 1px solid #d9d7cf; border-radius: 8px; background: #fff; box-shadow: 0 16px 40px rgba(35,38,35,.16); }
    .list-editor input { width: 100%; height: 36px; padding: 0 9px; border: 1px solid #dfe1dc; border-radius: 6px; outline: none; }
    .list-editor-label { display: block; margin: 11px 0 6px; color: #858d85; font-size: 9px; font-weight: 800; letter-spacing: .09em; text-transform: uppercase; }
    .list-editor-options { display: flex; flex-wrap: wrap; gap: 6px; }
    .list-editor-options button { display: grid; place-items: center; width: 30px; height: 30px; padding: 0; border: 1px solid #e0e2dd; border-radius: 6px; background: #fff; }
    .list-editor-options button.selected { border-color: #77a391; background: #edf5f1; }
    .list-editor-options img { width: 15px; height: 15px; }
    .tone-dot { width: 14px; height: 14px; border-radius: 4px; }
    .tone-dot.blue { background: #cbd9ee; }.tone-dot.amber { background: #ead7ad; }.tone-dot.green { background: #cce1d6; }.tone-dot.rose { background: #ead1ce; }
    .list-editor-actions { display: flex; justify-content: flex-end; margin-top: 12px; }
    .list-editor-actions button { min-height: 32px; padding: 0 11px; border: 0; border-radius: 6px; background: #26312d; color: #fff; font-weight: 700; }
    .list-token { display: grid; place-items: center; width: 18px; height: 18px; border-radius: 5px; background: #e2e7e2; color: #617064; font-size: 8px; font-weight: 850; text-transform: uppercase; }
    .list-token img { width: 11px; height: 11px; opacity: .72; }
    .list-token.amber { background: #f3e5ca; color: #956617; }
    .list-token.blue { background: #e1e9f5; color: #4a6487; }
    .list-token.green { background: #dfece5; color: #45715d; }
    .list-token.rose { background: #f2e1df; color: #8b5b55; }
    .nav-add { color: #7b847c; font-size: 12px; font-weight: 650; }

    .task-pane { min-width: 0; padding: 28px 30px; border-right: 1px solid var(--line); overflow: auto; }
    .pane-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; margin-bottom: 22px; }
    .pane-head h1 { margin: 0; font-size: 28px; letter-spacing: 0; }
    .pane-head p { margin: 5px 0 0; color: var(--muted); font-size: 13px; }
    .search-button { display: grid; place-items: center; width: 38px; height: 38px; padding: 0; border: 1px solid var(--line); border-radius: 7px; background: #fff; }

    .composer { display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 8px; margin-bottom: 22px; }
    .composer input { min-height: 42px; padding: 0 12px; border: 1px solid var(--line); border-radius: 7px; background: #fff; color: var(--ink); }
    .primary { min-height: 40px; padding: 0 16px; border: 0; border-radius: 7px; background: var(--ink); color: #fff; font-weight: 750; }
    .group-title { display: flex; align-items: center; justify-content: space-between; margin: 20px 0 6px; color: #7b8493; font-size: 11px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; }

    .task-row { display: grid; grid-template-columns: 22px minmax(0,1fr) auto; align-items: center; gap: 10px; min-height: 54px; padding: 7px 8px; border-bottom: 1px solid #edf0f3; background: transparent; }
    .task-row:hover, .task-row.selected { background: #f3f6fb; }
    .check { width: 18px; height: 18px; border: 1.5px solid #bdc6d2; border-radius: 50%; background: #fff; }
    .check.done { border-color: var(--green); background: var(--green); box-shadow: inset 0 0 0 4px #fff; }
    .task-copy { min-width: 0; }
    .task-copy strong { display: block; overflow: hidden; font-size: 14px; text-overflow: ellipsis; white-space: nowrap; }
    .task-copy small { display: block; margin-top: 3px; color: var(--muted); font-size: 11px; }
    .priority { display: inline-block; width: 6px; height: 6px; margin-right: 6px; border-radius: 2px; vertical-align: 1px; }
    .priority.high { background: #d75555; }
    .priority.medium { background: #d3972b; }
    .more { display: grid; place-items: center; width: 30px; height: 30px; padding: 0; border: 0; border-radius: 6px; background: transparent; opacity: .55; }
    .more:hover { background: #e9eef6; opacity: 1; }

    .detail-pane { position: relative; min-width: 0; padding: 28px 34px; background: #fff; overflow: auto; }
    .detail-empty { display: grid; place-items: center; height: 100%; color: var(--muted); text-align: center; }
    .detail-head { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 28px; }
    .object-label { color: #8d96a5; font-size: 10px; font-weight: 800; letter-spacing: .11em; text-transform: uppercase; }
    .detail-actions { display: flex; gap: 4px; }
    .icon-button { display: grid; place-items: center; width: 34px; height: 34px; padding: 0; border: 0; border-radius: 6px; background: transparent; }
    .icon-button:hover { background: #f1f4f8; }
    .task-title { width: 100%; padding: 0; border: 0; outline: 0; color: var(--ink); font-size: 25px; font-weight: 760; line-height: 1.25; }
    .description { width: 100%; min-height: 110px; margin-top: 18px; padding: 14px 0; border: 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); outline: 0; color: #495365; line-height: 1.55; resize: vertical; }
    .property-bar { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 18px; }
    .property { min-height: 32px; padding: 0 10px; border: 1px solid var(--line); border-radius: 7px; background: #fff; color: #596375; font-size: 12px; font-weight: 650; }
    .property.active { border-color: #b9cff7; background: var(--blue-soft); color: #245abf; }
    .subtasks { margin-top: 30px; }
    .subtasks h2 { margin: 0 0 10px; font-size: 13px; }
    .subtask { display: flex; align-items: center; gap: 10px; min-height: 42px; border-bottom: 1px solid #eef0f3; font-size: 13px; }
    .activity { margin-top: 28px; padding-top: 18px; border-top: 1px solid var(--line); color: var(--muted); font-size: 12px; }

    .quick-menu { position: absolute; top: 68px; right: 28px; z-index: 10; display: none; width: 260px; padding: 8px; border: 1px solid var(--line); border-radius: 8px; background: #fff; box-shadow: 0 16px 44px rgba(18,24,34,.16); }
    .quick-menu.open { display: block; }
    .menu-row { display: flex; align-items: center; justify-content: space-between; min-height: 38px; padding: 0 10px; border: 0; border-radius: 6px; background: transparent; color: #374153; }
    .menu-row:hover { background: #f3f5f8; }
    .menu-separator { height: 1px; margin: 6px 0; background: var(--line); }
    .menu-flags { display: grid; grid-template-columns: repeat(3,1fr); gap: 5px; padding: 7px; }
    .menu-flags button { min-height: 30px; border: 1px solid var(--line); border-radius: 6px; background: #fff; font-size: 11px; }

    .operator-note { display: none; margin-top: 24px; padding: 14px 16px; border-left: 3px solid var(--green); background: #f3faf7; color: #3c594d; font-size: 12px; line-height: 1.5; }
    .operator-note strong { display: block; margin-bottom: 4px; color: #245b45; }

    /* Direction A: classic, dense tracker */
    .direction-a .app-grid { grid-template-columns: 56px 240px minmax(440px, 520px) minmax(480px, 1fr); }
    .direction-a .sidebar { background: #fbfcfd; }

    /* Direction B: editorial workbench */
    .direction-b { --canvas: #f6f5f1; --line: #e4e1d9; --blue: #2f6a59; --blue-soft: #eaf3ef; --ink: #18201d; }
    .direction-b .app-grid { grid-template-columns: 56px 240px minmax(420px, 520px) minmax(0, 1fr); background: #faf9f6; }
    .direction-b .module-rail { display: flex; background: #ebeae5; }
    .direction-b .module-rail button.active { background: #dfe9e4; color: #285e4d; }
    .direction-b .sidebar { padding: 26px 20px; background: #f1f0eb; }
    .direction-b .nav-section { margin-top: 18px; }
    .direction-b .nav-section + .nav-section { padding-top: 14px; border-top: 1px solid #dfdcd3; }
    .direction-b .nav-item { min-height: 36px; }
    .direction-b .nav-item.active { background: #e5ece8; color: #285e4d; }
    .direction-b .brand-mark { border-radius: 50%; background: #bb852e; }
    .direction-b .task-pane { padding: 38px 40px; background: #faf9f6; }
    .direction-b .pane-head h1 { font-size: 34px; font-weight: 700; }
    .direction-b .composer { margin-bottom: 30px; }
    .direction-b .task-row { min-height: 62px; padding: 10px 4px; }
    .direction-b .task-row.selected { background: #ecefe9; }
    .direction-b .detail-pane { padding: 42px 54px; background: #fff; }
    .direction-b .task-title { font-size: 32px; font-weight: 700; }
    .direction-b .description { min-height: 150px; }
    .direction-b .property { border-radius: 4px; }
    .direction-b.theme-sky { --blue: #3b67a5; --blue-soft: #eaf0f8; --ink: #182331; }
    .direction-b.theme-sky .module-rail { background: #e9edf2; }
    .direction-b.theme-sky .sidebar { background: #f0f3f6; }
    .direction-b.theme-amber { --blue: #9a6a26; --blue-soft: #f5ead8; --ink: #2a2118; }
    .direction-b.theme-amber .module-rail { background: #eee8de; }
    .direction-b.theme-amber .sidebar { background: #f5f1e9; }
    .direction-b.type-editorial .pane-head h1, .direction-b.type-editorial .task-title { font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif; font-weight: 600; }
    .direction-b.type-editorial .pane-head h1 { font-size: 38px; }

    /* Direction C: operational Daily OS */
    .direction-c { --blue: #275fbd; --blue-soft: #edf4ff; --canvas: #f4f6f8; }
    .direction-c .app-grid { grid-template-columns: 56px 224px minmax(580px, 1fr) 420px; }
    .direction-c .task-pane { padding: 26px 34px; background: #f8f9fb; }
    .direction-c .detail-pane { padding: 26px 30px; }
    .direction-c .operator-note { display: block; }
    .direction-c .group-title { margin-top: 24px; }
    .direction-c .task-row { min-height: 58px; margin-bottom: 6px; padding: 8px 10px; border: 1px solid #e5e9ef; border-radius: 7px; background: #fff; }
    .direction-c .task-row.selected { border-color: #bad0f4; background: #f2f6fd; }
    .direction-c .pane-head::after { content: "План устойчив"; align-self: center; padding: 6px 9px; border: 1px solid #cce0d7; border-radius: 6px; background: #f3faf7; color: #35705a; font-size: 11px; font-weight: 750; }
    .direction-c .search-button { display: none; }

    @media (max-width: 980px) {
      .lab-bar { grid-template-columns: 1fr; gap: 8px; }
      .direction-tabs { justify-self: start; overflow-x: auto; }
      .direction-note { display: none; }
      .prototype { min-height: calc(100vh - 120px); }
      .app-grid, .direction-a .app-grid, .direction-b .app-grid, .direction-c .app-grid { grid-template-columns: 1fr; min-height: calc(100vh - 120px); }
      .module-rail, .sidebar { display: none !important; }
      .task-pane { border-right: 0; padding: 22px 18px 76px; }
      .detail-pane { position: fixed; inset: 120px 0 0; z-index: 30; display: none; padding: 24px 18px; }
      .detail-pane.mobile-open { display: block; }
      .composer { grid-template-columns: 1fr; }
      .composer button { justify-self: end; }
    }
  </style>
</head>
<body>
  <header class="lab-bar">
    <div class="lab-title"><strong>Daily OS — Task Core</strong><span>Интерактивное сравнение архитектуры</span></div>
    <nav class="direction-tabs" aria-label="Направления">
      <button class="active" data-direction="a">A · Compact</button>
      <button data-direction="b">B · Editorial</button>
      <button data-direction="c">C · Operator</button>
    </nav>
    <div class="direction-note" id="directionNote">Самый прямой и привычный task tracker</div>
    <div class="style-controls" id="styleControls" aria-label="Настройка Editorial">
      <button class="active" data-theme="sage">Sage</button><button data-theme="sky">Sky</button><button data-theme="amber">Amber</button>
      <button class="active" data-type="clean">Clean</button><button data-type="editorial">Editorial type</button>
    </div>
  </header>

  <main class="prototype direction-a" id="prototype"></main>

  <script>
    const directions = {
      a: { note: "Самый прямой и привычный task tracker" },
      b: { note: "Спокойная рабочая среда с большим редактором" },
      c: { note: "Daily OS с точечным вмешательством ассистента" }
    };

    let currentDirection = "a";
    let selectedId = "task-1";
    let menuOpen = false;
    let editorialTheme = "sage";
    let editorialType = "clean";
    let editingListId = null;
    const collapsedGroups = new Set();
    const listIconChoices = ["list-todo", "notebook-pen", "calendar-days", "circle-check-big", "timer"];
    const editorialAreas = [
      { id: "work", title: "Работа", icon: "list-todo", lists: [
        { id: "career", title: "Карьера", count: 3, icon: "list-todo", tone: "blue" },
        { id: "projects", title: "Проекты", count: 5, icon: "notebook-pen", tone: "amber" }
      ]},
      { id: "personal", title: "Личное", icon: "notebook-pen", lists: [
        { id: "home", title: "Дом", count: 4, icon: "notebook-pen", tone: "rose" },
        { id: "learning", title: "Обучение", count: 2, icon: "calendar-days", tone: "green" }
      ]},
      { id: "health", title: "Здоровье", icon: "circle-check-big", lists: [
        { id: "routine", title: "Режим", count: 2, icon: "circle-check-big", tone: "green" }
      ]}
    ];
    let tasks = [
      { id: "task-1", title: "Проверить первый экран Today на телефоне", meta: "Сегодня · работа · 35 мин", priority: "high", group: "now", done: false },
      { id: "task-2", title: "Сформулировать 3 главных результата недели", meta: "Сегодня · личное · 25 мин", priority: "high", group: "now", done: false },
      { id: "task-3", title: "Подготовить вопросы к карьерной консультации", meta: "Завтра · карьера · 45 мин", priority: "medium", group: "next", done: false },
      { id: "task-4", title: "Разобрать старые заметки из Telegram", meta: "Без даты · личное", priority: "medium", group: "next", done: false }
    ];

    const icon = (name, alt = "") => `<img src="/icons/${name}.svg" alt="${alt}">`;

    function findEditorialList(id) {
      return editorialAreas.flatMap(area => area.lists).find(list => list.id === id);
    }

    function captureListEditorTitle(id) {
      const input = document.querySelector(`[data-list-form="${id}"] input[name="title"]`);
      const title = input?.value.trim();
      if (title) findEditorialList(id).title = title;
    }

    function listEditorMarkup(list) {
      if (editingListId !== list.id) return "";
      return `<form class="list-editor" data-list-form="${list.id}">
        <input name="title" value="${list.title}" aria-label="Название списка">
        <span class="list-editor-label">Иконка</span>
        <div class="list-editor-options">${listIconChoices.map(name => `<button type="button" class="${list.icon === name ? "selected" : ""}" data-action="set-list-icon" data-list-id="${list.id}" data-icon="${name}" aria-label="${name}">${icon(name)}</button>`).join("")}</div>
        <span class="list-editor-label">Цвет</span>
        <div class="list-editor-options">${["blue","amber","green","rose"].map(tone => `<button type="button" class="${list.tone === tone ? "selected" : ""}" data-action="set-list-tone" data-list-id="${list.id}" data-tone="${tone}" aria-label="${tone}"><span class="tone-dot ${tone}"></span></button>`).join("")}</div>
        <div class="list-editor-actions"><button type="submit">Сохранить</button></div>
      </form>`;
    }

    function editorialListMarkup(list) {
      return `<div class="sidebar-list-row"><button class="nav-item"><span class="list-token ${list.tone}">${icon(list.icon)}</span><strong>${list.title}</strong><span>${list.count}</span></button><button class="list-edit-trigger" data-action="edit-list" data-list-id="${list.id}" aria-label="Изменить ${list.title}" aria-expanded="${editingListId === list.id}">${icon("ellipsis")}</button>${listEditorMarkup(list)}</div>`;
    }

    function editorialAreasMarkup() {
      return `<section class="nav-section"><div class="nav-label">Области</div>${editorialAreas.map(area => `<div class="nav-group"><button class="nav-group-head" data-action="toggle-group" data-group="${area.id}">${icon(area.icon)}<strong>${area.title}</strong><span>${area.lists.length} ${area.lists.length === 1 ? "список" : "списка"}</span></button><div class="nav-group-items ${collapsedGroups.has(area.id) ? "collapsed" : ""}">${area.lists.map(editorialListMarkup).join("")}</div></div>`).join("")}<button class="nav-item nav-add">${icon("list-todo")}<strong>Новая область</strong><span></span></button></section>`;
    }

    function navMarkup() {
      const systemNavigation = `<section class="nav-section"><div class="nav-label">Задачи</div>
          <button class="nav-item active">${icon("list-todo")}<strong>Сегодня</strong><span>2</span></button>
          <button class="nav-item">${icon("list-todo")}<strong>Следующие 7 дней</strong><span>3</span></button>
          <button class="nav-item">${icon("notebook-pen")}<strong>Inbox</strong><span>4</span></button>
          <button class="nav-item">${icon("list-todo")}<strong>Все задачи</strong><span>12</span></button>
          <button class="nav-item">${icon("list-todo")}<strong>Выполненные</strong><span>18</span></button>
        </section>`;
      const standardLists = `<section class="nav-section"><div class="nav-label">Списки</div>
          <button class="nav-item"><span class="list-token blue">К</span><strong>карьера</strong><span>3</span></button>
          <button class="nav-item"><span class="list-token amber">Р</span><strong>работа</strong><span>5</span></button>
          <button class="nav-item"><span class="list-token green">О</span><strong>обучение</strong><span>2</span></button>
          <button class="nav-item"><span class="list-token rose">Л</span><strong>личное</strong><span>4</span></button>
          <button class="nav-item"><span class="list-token green">З</span><strong>здоровье</strong><span>2</span></button>
        </section>`;
      return `<aside class="module-rail" aria-label="Модули">
        <button class="active" title="Задачи" aria-label="Задачи">${icon("list-todo")}</button>
        <button title="Календарь" aria-label="Календарь">${icon("calendar-days")}</button>
        <button title="Привычки" aria-label="Привычки">${icon("circle-check-big")}</button>
        <button title="Фокус" aria-label="Фокус">${icon("timer")}</button>
        <div class="module-divider"></div>
        <button title="Заметки" aria-label="Заметки">${icon("notebook-pen")}</button>
        <div class="module-spacer"></div>
        <button title="Поиск" aria-label="Поиск">${icon("search")}</button>
      </aside>
      <aside class="sidebar">
        <div class="brand"><span class="brand-mark"></span><div><strong>Daily OS</strong><small>синхронизировано</small></div></div>
        ${systemNavigation}
        ${currentDirection === "b" ? editorialAreasMarkup() : standardLists}
      </aside>`;
    }

    function taskRow(task) {
      return `<article class="task-row ${task.id === selectedId ? "selected" : ""}" data-task-id="${task.id}">
        <button class="check ${task.done ? "done" : ""}" data-action="toggle" aria-label="${task.done ? "Вернуть" : "Завершить"}"></button>
        <button class="task-copy" data-action="select" style="border:0;background:transparent;text-align:left;padding:0">
          <strong>${task.title}</strong><small><span class="priority ${task.priority}"></span>${task.meta}</small>
        </button>
        <button class="more" data-action="menu" aria-label="Параметры">${icon("ellipsis")}</button>
      </article>`;
    }

    function listMarkup() {
      const current = tasks.filter(task => task.group === "now");
      const next = tasks.filter(task => task.group === "next");
      const grouped = currentDirection === "c";
      return `<section class="task-pane">
        <div class="pane-head"><div><h1>Сегодня</h1><p>${grouped ? "Принятый план без лишних обязательств" : "Задачи, которые действительно в работе"}</p></div><button class="search-button" title="Поиск">${icon("search")}</button></div>
        <form class="composer"><input id="quickAdd" placeholder="+ Новая задача"><button class="primary">Добавить</button></form>
        ${grouped ? `<div class="group-title"><span>Сейчас</span><span>${current.length}</span></div>` : ""}
        <div>${current.map(taskRow).join("")}</div>
        ${grouped ? `<div class="group-title"><span>Дальше</span><span>${next.length}</span></div><div>${next.map(taskRow).join("")}</div>` : `<div class="group-title"><span>Позже</span><span>${next.length}</span></div><div>${next.map(taskRow).join("")}</div>`}
      </section>`;
    }

    function detailMarkup() {
      const task = tasks.find(item => item.id === selectedId);
      if (!task) return `<aside class="detail-pane"><div class="detail-empty"><div><strong>Выбери задачу</strong><p>Редактор откроется здесь.</p></div></div></aside>`;
      return `<aside class="detail-pane mobile-open">
        <div class="detail-head"><span class="object-label">Задача</span><div class="detail-actions"><button class="icon-button" data-action="menu" aria-label="Параметры">${icon("ellipsis")}</button><button class="icon-button" data-action="close" aria-label="Закрыть">${icon("x")}</button></div></div>
        <input class="task-title" value="${task.title}" aria-label="Название задачи">
        <textarea class="description" aria-label="Описание">Проверить плотность, навигацию и открытие параметров на реальном мобильном экране. Зафиксировать только проблемы, мешающие ежедневному использованию.</textarea>
        <div class="property-bar">
          <button class="property active">Сегодня</button><button class="property">Высокий</button><button class="property">работа</button><button class="property">35 мин</button><button class="property">#интерфейс</button>
        </div>
        <section class="subtasks"><h2>Подзадачи · 1/3</h2>
          <div class="subtask"><span class="check done"></span><span>Открыть экран на телефоне</span></div>
          <div class="subtask"><span class="check"></span><span>Проверить добавление и завершение</span></div>
          <div class="subtask"><span class="check"></span><span>Записать найденные проблемы</span></div>
        </section>
        <div class="operator-note"><strong>Ассистент предлагает</strong>Не расширять задачу. После мобильной проверки зафиксировать максимум три проблемы и закрыть её сегодня.</div>
        <div class="activity">Изменено сегодня в 14:32 · сохранено</div>
        <div class="quick-menu ${menuOpen ? "open" : ""}">
          <div class="menu-flags"><button>Низкий</button><button>Средний</button><button>Высокий</button></div>
          <div class="menu-separator"></div>
          <button class="menu-row"><span>Сегодня</span></button>
          <button class="menu-row"><span>Переместить</span></button>
          <button class="menu-row"><span>Теги</span></button>
          <button class="menu-row"><span>Закрепить</span></button>
          <button class="menu-row"><span>Начать фокус</span></button>
          <div class="menu-separator"></div>
          <button class="menu-row" style="color:var(--danger)"><span>Удалить</span></button>
        </div>
      </aside>`;
    }

    function render() {
      document.getElementById("prototype").className = `prototype direction-${currentDirection} ${currentDirection === "b" ? `theme-${editorialTheme} type-${editorialType}` : ""}`;
      document.getElementById("prototype").innerHTML = `<div class="app-grid">${navMarkup()}${listMarkup()}${detailMarkup()}</div>`;
      document.getElementById("directionNote").textContent = directions[currentDirection].note;
      document.getElementById("directionNote").style.display = currentDirection === "b" ? "none" : "block";
      document.getElementById("styleControls").classList.toggle("visible", currentDirection === "b");
      document.querySelectorAll("[data-direction]").forEach(button => button.classList.toggle("active", button.dataset.direction === currentDirection));
      document.querySelectorAll("[data-theme]").forEach(button => button.classList.toggle("active", button.dataset.theme === editorialTheme));
      document.querySelectorAll("[data-type]").forEach(button => button.classList.toggle("active", button.dataset.type === editorialType));
    }

    document.addEventListener("click", event => {
      const direction = event.target.closest("[data-direction]");
      if (direction) { currentDirection = direction.dataset.direction; menuOpen = false; render(); return; }
      const theme = event.target.closest("[data-theme]");
      if (theme) { editorialTheme = theme.dataset.theme; render(); return; }
      const type = event.target.closest("[data-type]");
      if (type) { editorialType = type.dataset.type; render(); return; }
      const row = event.target.closest("[data-task-id]");
      const action = event.target.closest("[data-action]")?.dataset.action;
      if (action === "edit-list") {
        const id = event.target.closest("[data-list-id]").dataset.listId;
        editingListId = editingListId === id ? null : id;
        render();
        return;
      }
      if (action === "set-list-icon") {
        const id = event.target.closest("[data-list-id]").dataset.listId;
        captureListEditorTitle(id);
        findEditorialList(id).icon = event.target.closest("[data-icon]").dataset.icon;
        render();
        return;
      }
      if (action === "set-list-tone") {
        const id = event.target.closest("[data-list-id]").dataset.listId;
        captureListEditorTitle(id);
        findEditorialList(id).tone = event.target.closest("[data-tone]").dataset.tone;
        render();
        return;
      }
      if (action === "toggle-group") {
        const group = event.target.closest("[data-group]").dataset.group;
        collapsedGroups.has(group) ? collapsedGroups.delete(group) : collapsedGroups.add(group);
        render();
        return;
      }
      if (row && action === "toggle") {
        const task = tasks.find(item => item.id === row.dataset.taskId);
        task.done = !task.done;
        render();
        return;
      }
      if (row && action === "select") { selectedId = row.dataset.taskId; menuOpen = false; render(); return; }
      if (action === "menu") { if (row) selectedId = row.dataset.taskId; menuOpen = !menuOpen; render(); return; }
      if (action === "close") { selectedId = null; menuOpen = false; render(); }
    });

    document.addEventListener("contextmenu", event => {
      const row = event.target.closest("[data-task-id]");
      if (!row) return;
      event.preventDefault();
      selectedId = row.dataset.taskId;
      menuOpen = true;
      render();
    });

    document.addEventListener("submit", event => {
      if (event.target.matches("[data-list-form]")) {
        event.preventDefault();
        const list = findEditorialList(event.target.dataset.listForm);
        const title = event.target.elements.title.value.trim();
        if (title) list.title = title;
        editingListId = null;
        render();
        return;
      }
      if (!event.target.matches(".composer")) return;
      event.preventDefault();
      const input = event.target.querySelector("input");
      const title = input.value.trim();
      if (!title) return;
      const id = `task-${Date.now()}`;
      tasks.unshift({ id, title, meta: "Сегодня · Inbox", priority: "medium", group: "now", done: false });
      selectedId = id;
      input.value = "";
      render();
    });

    render();
  </script>
</body>
</html>
